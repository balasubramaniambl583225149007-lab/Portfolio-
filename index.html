<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balasubramaniam · Cyber Security</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK THEME ── */
  :root, [data-theme="dark"] {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #111820;
    --border: #1e2a35;
    --border2: #243040;
    --fg: #e8edf2;
    --muted: #5a7085;
    --muted2: #8096a8;
    --accent: #00d4ff;
    --accent2: #00ff88;
    --accent3: #ff6b35;
    --gold: #f5c842;
    --grid-color: rgba(0,212,255,0.03);
    --nav-bg: rgba(8,12,16,0.85);
    --card-hover-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  /* ── LIGHT THEME ── */
  [data-theme="light"] {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --border: #d0dbe6;
    --border2: #b8c8d8;
    --fg: #0d1b2a;
    --muted: #7a90a4;
    --muted2: #4a6278;
    --accent: #0077aa;
    --accent2: #00875a;
    --accent3: #d44f00;
    --gold: #b8860b;
    --grid-color: rgba(0,119,170,0.04);
    --nav-bg: rgba(240,244,248,0.9);
    --card-hover-shadow: 0 8px 30px rgba(0,0,0,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.1rem 3rem;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }

  .nav-left { display: flex; align-items: center; gap: 1.5rem; }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--fg);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .nav-logo span { color: var(--accent); }

  .nav-links { display: flex; gap: 0.25rem; list-style: none; align-items: center; }

  .nav-links a {
    font-size: 0.72rem;
    color: var(--muted2);
    text-decoration: none;
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.2s;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .nav-links a:hover { color: var(--accent); border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.05); }
  [data-theme="light"] .nav-links a:hover { border-color: rgba(0,119,170,0.2); background: rgba(0,119,170,0.05); }
  .nav-links a.active { color: var(--accent); border-color: rgba(0,212,255,0.25); background: rgba(0,212,255,0.07); }
  [data-theme="light"] .nav-links a.active { border-color: rgba(0,119,170,0.25); background: rgba(0,119,170,0.07); }

  /* THEME TOGGLE */
  .theme-toggle {
    width: 40px; height: 22px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    position: relative;
    transition: all 0.3s;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 3px;
  }
  .theme-toggle:hover { border-color: var(--accent); }

  .toggle-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform 0.3s, background 0.3s;
    position: absolute;
    left: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
  }

  [data-theme="light"] .toggle-thumb { transform: translateX(18px); }

  .toggle-icons {
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 1px;
    font-size: 0.55rem;
    pointer-events: none;
    user-select: none;
  }

  /* PAGE TRANSITIONS */
  .page { display: none; animation: fadeIn 0.35s ease; }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== HOME PAGE ========== */
  .hero {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 4rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero-eyebrow {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 2rem;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .eyebrow-text { font-size: 0.72rem; color: var(--muted2); letter-spacing: 0.1em; text-transform: uppercase; }
  .eyebrow-text span { color: var(--accent2); }

  .hero-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s;
  }

  .hero-name .line2 {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1px rgba(0,212,255,0.4);
  }
  [data-theme="light"] .hero-name .line2 { -webkit-text-stroke: 1px rgba(0,119,170,0.5); }

  .hero-role {
    font-size: 0.85rem; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 1.75rem;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.35s;
  }
  .hero-role::before { content: '> '; color: var(--muted); }

  .hero-bio {
    font-size: 0.9rem; color: var(--muted2);
    max-width: 520px; line-height: 1.8; font-weight: 300;
    margin-bottom: 3rem;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.5s;
  }
  .hero-bio strong { color: var(--fg); font-weight: 400; }

  .hero-stats {
    display: flex; gap: 1rem; flex-wrap: wrap;
    margin-bottom: 3rem;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.65s;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.5rem;
    display: flex; flex-direction: column; gap: 0.3rem;
    min-width: 130px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: rgba(0,212,255,0.3); transform: translateY(-2px); }
  [data-theme="light"] .stat-card:hover { border-color: rgba(0,119,170,0.3); }

  .stat-num { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }

  .hero-actions {
    display: flex; gap: 1rem; flex-wrap: wrap;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.8s;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.75rem 1.75rem; border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; letter-spacing: 0.05em; text-transform: uppercase;
    text-decoration: none; transition: all 0.2s; font-weight: 500;
    cursor: pointer; border: none;
  }

  .btn-primary { background: var(--accent); color: #000; border: 1px solid var(--accent); }
  .btn-primary:hover { background: transparent; color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
  .btn-ghost { background: transparent; color: var(--muted2); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--fg); border-color: var(--fg); }

  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
    max-width: 1100px; margin: 0 auto; position: relative; z-index: 1;
  }

  .section { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 5rem 3rem; }

  .section-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 3rem; }

  .section-tag {
    font-size: 0.68rem; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase;
    background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.2);
    padding: 0.3rem 0.75rem; border-radius: 3px;
  }
  [data-theme="light"] .section-tag { background: rgba(0,119,170,0.07); border-color: rgba(0,119,170,0.2); }

  .section-line { flex: 1; height: 1px; background: var(--border); max-width: 80px; }

  .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }

  .skill-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1.25rem 1.5rem; transition: border-color 0.2s;
  }
  .skill-group:hover { border-color: var(--border2); }

  .skill-group-title {
    font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .skill-group-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }

  .skill-tag {
    font-size: 0.72rem; color: var(--muted2); background: var(--surface2);
    border: 1px solid var(--border); padding: 0.25rem 0.6rem; border-radius: 4px;
    letter-spacing: 0.02em; transition: all 0.2s;
  }
  .skill-tag:hover { color: var(--fg); border-color: var(--border2); }

  .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

  .link-card {
    display: flex; align-items: center; gap: 1.25rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1.25rem 1.5rem;
    text-decoration: none; color: inherit;
    transition: all 0.25s; position: relative; overflow: hidden; cursor: pointer;
  }
  .link-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,212,255,0.04), transparent); opacity: 0; transition: opacity 0.25s; }
  [data-theme="light"] .link-card::after { background: linear-gradient(135deg, rgba(0,119,170,0.04), transparent); }
  .link-card:hover { border-color: rgba(0,212,255,0.35); transform: translateY(-2px); box-shadow: var(--card-hover-shadow); }
  [data-theme="light"] .link-card:hover { border-color: rgba(0,119,170,0.35); }
  .link-card:hover::after { opacity: 1; }

  .link-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; position: relative; z-index: 1; }
  .link-info { position: relative; z-index: 1; flex: 1; }
  .link-title { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--fg); margin-bottom: 0.2rem; }
  .link-desc { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.02em; }
  .link-arrow { color: var(--muted); font-size: 1rem; transition: all 0.2s; position: relative; z-index: 1; }
  .link-card:hover .link-arrow { color: var(--accent); transform: translateX(3px); }

  .contact-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }

  .contact-chip {
    display: inline-flex; align-items: center; gap: 0.5rem;
    font-size: 0.78rem; color: var(--muted2); background: var(--surface);
    border: 1px solid var(--border); padding: 0.6rem 1.1rem; border-radius: 5px;
    text-decoration: none; transition: all 0.2s; letter-spacing: 0.02em;
  }
  .contact-chip:hover { color: var(--accent); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }
  [data-theme="light"] .contact-chip:hover { border-color: rgba(0,119,170,0.3); background: rgba(0,119,170,0.05); }

  /* ========== SUBPAGE SHARED ========== */
  .page-header {
    position: relative; z-index: 1;
    padding: 8rem 3rem 4rem; max-width: 1100px; margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .breadcrumb {
    font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em;
    margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .breadcrumb a { color: var(--muted2); text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .breadcrumb a:hover { color: var(--accent); }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em;
    margin-bottom: 0.75rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s;
  }
  .page-subtitle { font-size: 0.85rem; color: var(--muted2); font-weight: 300; opacity: 0; animation: fadeUp 0.6s ease forwards 0.25s; }

  /* ========== PROJECTS PAGE ========== */
  .projects-main {
    position: relative; z-index: 1; max-width: 1100px; margin: 0 auto;
    padding: 4rem 3rem 6rem; display: flex; flex-direction: column; gap: 2rem;
  }

  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
    opacity: 0; animation: fadeUp 0.6s ease forwards;
  }
  .project-card:nth-child(1) { animation-delay: 0.1s; }
  .project-card:nth-child(2) { animation-delay: 0.25s; }
  .project-card:nth-child(3) { animation-delay: 0.4s; }
  .project-card:hover { border-color: rgba(0,212,255,0.3); box-shadow: 0 12px 50px rgba(0,0,0,0.5); }
  [data-theme="light"] .project-card:hover { border-color: rgba(0,119,170,0.3); box-shadow: 0 12px 50px rgba(0,0,0,0.1); }

  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 1.5rem; padding: 2rem 2rem 1.5rem; border-bottom: 1px solid var(--border);
  }
  .card-num { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; color: rgba(0,212,255,0.07); line-height: 1; flex-shrink: 0; user-select: none; }
  [data-theme="light"] .card-num { color: rgba(0,119,170,0.1); }
  .card-header-content { flex: 1; }
  .card-category { font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 0.5rem; }
  .card-subtitle { font-size: 0.78rem; color: var(--muted2); font-weight: 300; font-style: italic; }
  .card-body { padding: 1.5rem 2rem; }
  .card-desc { font-size: 0.85rem; color: var(--muted2); line-height: 1.85; font-weight: 300; margin-bottom: 1.5rem; }
  .card-desc strong { color: var(--fg); font-weight: 400; }
  .card-skills-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.6rem; }
  .card-skills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .skill-pill { font-size: 0.72rem; color: var(--fg); background: var(--surface2); border: 1px solid var(--border2); padding: 0.3rem 0.7rem; border-radius: 4px; letter-spacing: 0.02em; }
  .skill-pill.highlight { color: var(--accent); background: rgba(0,212,255,0.07); border-color: rgba(0,212,255,0.2); }
  [data-theme="light"] .skill-pill.highlight { background: rgba(0,119,170,0.07); border-color: rgba(0,119,170,0.2); }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; background: var(--surface2); border-top: 1px solid var(--border);
    flex-wrap: wrap; gap: 0.75rem;
  }
  .card-meta { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .card-links { display: flex; gap: 0.6rem; }
  .card-link {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.72rem; color: var(--muted2); text-decoration: none;
    padding: 0.4rem 0.85rem; border: 1px solid var(--border2); border-radius: 4px;
    letter-spacing: 0.04em; transition: all 0.2s;
  }
  .card-link:hover { color: var(--accent); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.05); }

  /* ========== CERTIFICATIONS PAGE ========== */
  .certs-main {
    position: relative; z-index: 1; max-width: 1100px; margin: 0 auto;
    padding: 4rem 3rem 6rem; display: flex; flex-direction: column; gap: 1.5rem;
  }

  .legend {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 1rem;
    opacity: 0; animation: fadeUp 0.5s ease forwards 0.05s;
  }
  .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: var(--muted2); letter-spacing: 0.04em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-earned { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .dot-progress { background: var(--gold); box-shadow: 0 0 6px var(--gold); animation: pulse 2s ease infinite; }

  .cert-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; display: grid; grid-template-columns: auto 1fr auto;
    overflow: hidden; transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
    opacity: 0; animation: fadeUp 0.6s ease forwards;
  }
  .cert-card:nth-child(2) { animation-delay: 0.1s; }
  .cert-card:nth-child(3) { animation-delay: 0.25s; }
  .cert-card:nth-child(4) { animation-delay: 0.4s; }
  .cert-card:nth-child(5) { animation-delay: 0.55s; }
  .cert-card:hover { border-color: rgba(0,212,255,0.3); box-shadow: 0 8px 40px rgba(0,0,0,0.4); transform: translateY(-2px); }
  [data-theme="light"] .cert-card:hover { border-color: rgba(0,119,170,0.3); box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
  .cert-card.status-earned { border-left: 3px solid var(--accent2); }
  .cert-card.status-progress { border-left: 3px solid var(--gold); }

  .cert-icon-wrap { padding: 2rem 1.5rem 2rem 2rem; display: flex; align-items: flex-start; }
  .cert-icon { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; border: 1px solid var(--border2); }
  .icon-cisco { background: linear-gradient(135deg, rgba(0,163,224,0.15), rgba(0,163,224,0.05)); border-color: rgba(0,163,224,0.25); }
  .icon-thm { background: linear-gradient(135deg, rgba(196,40,40,0.15), rgba(196,40,40,0.05)); border-color: rgba(196,40,40,0.25); }
  .icon-deloitte { background: linear-gradient(135deg, rgba(134,188,37,0.15), rgba(134,188,37,0.05)); border-color: rgba(134,188,37,0.25); }

  .cert-content { padding: 2rem 1.5rem 2rem 0; display: flex; flex-direction: column; gap: 0.5rem; }
  .cert-issuer { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .cert-name { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
  .cert-desc { font-size: 0.78rem; color: var(--muted2); font-weight: 300; line-height: 1.7; margin-top: 0.25rem; }
  .cert-tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.5rem; }
  .cert-tag { font-size: 0.65rem; color: var(--muted2); background: var(--surface2); border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 3px; letter-spacing: 0.02em; }

  .cert-meta-col {
    padding: 2rem; display: flex; flex-direction: column;
    align-items: flex-end; justify-content: space-between; gap: 1rem; min-width: 140px;
  }
  .cert-status-badge { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.3rem 0.75rem; border-radius: 20px; font-we
